<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Md. Jewel Rana - Profile Card</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=DM+Sans:400,500|Jost:400,500,600&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: "Jost", sans-serif;
      background: url("https://images.unsplash.com/photo-1542281286-9e0a16bb7366") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 360px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .card-cover {
      height: 120px;
      background-image: url("https://images.unsplash.com/photo-1485217988980-11786ced9454");
      background-size: cover;
      background-position: center;
    }

    .card-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      margin: -50px auto 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .card-fullname {
      font-size: 22px;
      font-weight: bold;
    }

    .card-jobtitle {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 15px;
    }

    .card-content {
      padding: 0 20px 20px;
    }

    .card-desc {
      font-size: 14px;
      line-height: 1.5;
      color: #555;
    }

    .card-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      padding: 0 20px 20px;
    }

    .btn {
      flex: 0 0 48%;
      text-align: center;
      margin-top: 10px;
      padding: 12px 0;
      border-radius: 8px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      transition: 0.3s ease;
      font-size: 14px;
    }

    .call { background-color: #43a047; }
    .facebook { background-color: #3b5998; }
    .whatsapp { background-color: #25d366; }
    .email { background-color: #ef6c00; }

    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-cover"></div>
    <img class="card-avatar" src="https://raw.githubusercontent.com/newsbase/itc/refs/heads/main/profile.jpg" alt="Md. Jewel Rana">
    <div class="card-fullname">Md. Jewel Rana</div>
    <div class="card-jobtitle">Web & App Developer</div>
    <div class="card-content">
      <p class="card-desc">
        Next time setup. The is a great day of school and I have a great day of the most of 🎒📚 the way you can I get it done with a great 👍 day I have a great day and I have been a great 👍 day of 🎒📚 school.
      </p>
    </div>
    <div class="card-buttons">
      <a class="btn call" href="#" onclick="makeCall()">Call</a>
      <a class="btn facebook" href="#" onclick="openFacebook()">Facebook</a>
      <a class="btn whatsapp" href="#" onclick="openWhatsApp()">WhatsApp</a>
      <a class="btn email" href="#" onclick="openEmail()">Email</a>
    </div>
  </div>

  <script>
    function makeCall() {
      const number = "+88001723580852";
      window.location.href = "tel:" + number;
    }

    function openFacebook() {
      const url = "https://facebook.com/me.jnrana";
      const fbIntent = "fb://facewebmodal/f?href=" + url;
      try {
        window.location.href = fbIntent;
        setTimeout(() => { window.location.href = url; }, 500);
      } catch {
        window.location.href = url;
      }
    }

    function openWhatsApp() {
      const number = "8801797740021";
      const webUrl = "https://wa.me/" + number;
      const appIntent = "intent://send?phone=" + number + "#Intent;package=com.whatsapp;scheme=smsto;end";
      try {
        window.location.href = appIntent;
        setTimeout(() => { window.location.href = webUrl; }, 500);
      } catch {
        window.location.href = webUrl;
      }
    }

    function openEmail() {
      const email = "jewel.raj.bp@gmail.com";
      const subject = encodeURIComponent("Hello Jewel Rana");
      const body = encodeURIComponent("Hi, I wanted to contact you...");
      const mailto = `mailto:${email}?subject=${subject}&body=${body}`;
      window.location.href = mailto;
    }
  </script>

</body>
</html>

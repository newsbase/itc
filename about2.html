<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Hover Animation</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0396FF;
    }
    .container{
      height:500px;
      display:flex;
      min-width:400px;
      align-items:flex-end;
      justify-content:center;
      margin-top:-55px;
    }
    .icon-image{
      position:relative;
      height:70px;
      width:70px;
      margin:0 5px;
      cursor:pointer;
      box-shadow:0 5px 10px rgba(0,0,0,0.25);
      border-radius:50%;
      background:#fff;
    }
    .icon-image .icon img{
      position:absolute;
      height:95%;
      width:95%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      object-fit:cover;
      border-radius:50%;
      border:3px solid #0396FF;
    }
    .icon-image .hover-image{
      position:absolute;
      height:350px;
      width:300px;
      bottom:100px;
      left:50%;
      z-index:0;
      transform:translateX(-50%);
      border-radius:25px;
      pointer-events:none;
      box-shadow:0 5px 10px rgba(0,0,0,0.15);
      transition:0.5s;
    }
    .icon-image:hover .hover-image{
      left:-200px;
      z-index:12;
      transform:translateX(80px);
    }
    .hover-image img{
      height:100%;
      width:100%;
      object-fit:cover;
      border:3px solid #fff;
      border-radius:25px;
    }
    .content{
      position:absolute;
      width:100%;
      bottom:-10px;
      padding:0 10px;
    }
    .details{
      background:#fff;
      padding:10px;
      border-radius:12px;
      text-align:center;
      opacity:0;
      transform:translateY(10px);
      transition:0.5s;
    }
    .icon-image:hover .details{
      opacity:1;
      transform:translateY(0);
    }
    .name{font-size:20px;font-weight:500;}
    .job{font-size:17px;color:#0396FF;}
  </style>
</head>

<body>

<div class="container">

  <!-- 1 -->
  <div class="icon-image">
    <div class="icon">
      <img src="https://i.pravatar.cc/100?img=1">
    </div>
    <div class="hover-image">
      <img src="https://i.pravatar.cc/300?img=1">
      <div class="content">
        <div class="details">
          <div class="name">David Marloo</div>
          <div class="job">Designer || Developer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 2 -->
  <div class="icon-image">
    <div class="icon">
      <img src="https://i.pravatar.cc/100?img=5">
    </div>
    <div class="hover-image">
      <img src="https://i.pravatar.cc/300?img=5">
      <div class="content">
        <div class="details">
          <div class="name">Lilly Carls</div>
          <div class="job">Blogger || Designer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3 -->
  <div class="icon-image">
    <div class="icon">
      <img src="https://i.pravatar.cc/100?img=8">
    </div>
    <div class="hover-image">
      <img src="https://i.pravatar.cc/300?img=8">
      <div class="content">
        <div class="details">
          <div class="name">Stephen Bald</div>
          <div class="job">Designer || Developer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 4 -->
  <div class="icon-image">
    <div class="icon">
      <img src="https://i.pravatar.cc/100?img=12">
    </div>
    <div class="hover-image">
      <img src="https://i.pravatar.cc/300?img=12">
      <div class="content">
        <div class="details">
          <div class="name">Mike Tyson</div>
          <div class="job">Photographer || Youtuber</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 5 -->
  <div class="icon-image">
    <div class="icon">
      <img src="https://i.pravatar.cc/100?img=15">
    </div>
    <div class="hover-image">
      <img src="https://i.pravatar.cc/300?img=15">
      <div class="content">
        <div class="details">
          <div class="name">Emma Oliva</div>
          <div class="job">Developer || Designer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 6 -->
  <div class="icon-image">
    <div class="icon">
      <img src="https://i.pravatar.cc/100?img=20">
    </div>
    <div class="hover-image">
      <img src="https://i.pravatar.cc/300?img=20">
      <div class="content">
        <div class="details">
          <div class="name">David Marloo</div>
          <div class="job">Blogger || Youtuber</div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
